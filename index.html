<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>ChennaigotInteresting</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎉</text></svg>">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#E63946;--red-d:#C1121F;--red-l:#ff6b6b;
  --blue:#457B9D;--amber:#F4A261;--green:#10B981;
  --bg:#F1F5F9;--card:#fff;--text:#0F172A;--t2:#475569;--t3:#94A3B8;
  --border:#E2E8F0;--r:12px;--rs:8px;--rf:999px;
  --sh:0 1px 3px rgba(0,0,0,.1),0 1px 2px rgba(0,0,0,.06);
  --shm:0 4px 6px rgba(0,0,0,.07),0 2px 4px rgba(0,0,0,.05);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#CBD5E1;color:var(--text);min-height:100vh;display:flex;justify-content:center;-webkit-font-smoothing:antialiased}
#root{width:100%;max-width:430px;min-height:100vh;background:var(--bg);box-shadow:0 0 40px rgba(0,0,0,.2);overflow:hidden}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--border)}

/* LAYOUT */
.app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:68px}
.header{background:var(--red);color:#fff;padding:12px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.header-title{font-size:17px;font-weight:800;flex:1;letter-spacing:-.2px}
.header-sub{font-size:11px;opacity:.8;margin-top:1px}
.icon-btn{background:rgba(255,255,255,.18);border:none;color:#fff;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;flex-shrink:0;-webkit-tap-highlight-color:transparent}
.icon-btn:active{background:rgba(255,255,255,.32)}

/* BOTTOM NAV */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:#fff;border-top:1px solid var(--border);display:grid;grid-template-columns:repeat(4,1fr);z-index:100;box-shadow:0 -2px 12px rgba(0,0,0,.08)}
.nav-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:8px 4px 10px;border:none;background:none;cursor:pointer;-webkit-tap-highlight-color:transparent;min-height:56px}
.nav-icon{font-size:21px;position:relative;display:inline-block}
.nav-label{font-size:10px;font-weight:500;color:var(--t3)}
.nav-btn.on .nav-label{color:var(--red);font-weight:700}
.n-dot{position:absolute;top:-2px;right:-4px;width:8px;height:8px;background:var(--red);border-radius:50%;border:1.5px solid #fff}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:11px 20px;border-radius:var(--rf);border:none;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent;white-space:nowrap;font-family:inherit}
.btn:active{transform:scale(.97)}
.btn-red{background:var(--red);color:#fff}.btn-red:hover{background:var(--red-d)}
.btn-out{background:#fff;color:var(--red);border:1.5px solid var(--red)}
.btn-ghost{background:var(--bg);color:var(--t2)}
.btn-green{background:var(--green);color:#fff}
.btn-w{width:100%}
.btn-sm{padding:8px 14px;font-size:13px}
.btn-lg{padding:14px 24px;font-size:16px}

/* ONBOARDING */
.ob{min-height:100vh;display:flex;flex-direction:column;background:#fff}
.ob-hero{background:var(--red);padding:52px 24px 32px;text-align:center;color:#fff}
.ob-logo{font-size:52px;margin-bottom:10px}
.ob-name{font-size:21px;font-weight:800;margin-bottom:4px}
.ob-tag{font-size:13px;opacity:.85;line-height:1.5}
.ob-prog{display:flex;gap:6px;justify-content:center;padding:18px 24px 0}
.ob-d{height:6px;border-radius:3px;background:var(--border);transition:all .3s}
.ob-d.done{background:var(--green);width:20px}
.ob-d.on{background:var(--red);width:28px}
.ob-d.off{width:8px}
.ob-body{flex:1;padding:24px;overflow-y:auto}
.ob-t{font-size:21px;font-weight:700;margin-bottom:6px}
.ob-s{font-size:14px;color:var(--t2);margin-bottom:20px;line-height:1.5}
.ob-foot{padding:16px 24px 32px;display:flex;gap:10px}

/* CITY/LANG CARDS */
.city-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.city-card{border:2px solid var(--border);border-radius:var(--r);padding:20px 12px;text-align:center;cursor:pointer;background:#fff;transition:all .2s;-webkit-tap-highlight-color:transparent}
.city-card:active{transform:scale(.97)}
.city-card.sel{border-color:var(--red);background:#FFF0F1}
.city-em{font-size:40px;margin-bottom:8px}
.city-nm{font-size:15px;font-weight:700;margin-bottom:2px}
.city-dc{font-size:11px;color:var(--t2)}
.lang-list{display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
.lang-card{border:2px solid var(--border);border-radius:var(--r);padding:14px 18px;display:flex;align-items:center;gap:14px;cursor:pointer;background:#fff;transition:all .2s;-webkit-tap-highlight-color:transparent}
.lang-card:active{transform:scale(.98)}
.lang-card.sel{border-color:var(--red);background:#FFF0F1}

/* CHIPS */
.chips{display:flex;flex-wrap:wrap;gap:9px;margin-bottom:20px}
.chip{padding:9px 15px;border-radius:var(--rf);border:1.5px solid var(--border);font-size:13px;font-weight:500;cursor:pointer;background:#fff;color:var(--text);transition:all .15s;-webkit-tap-highlight-color:transparent;display:flex;align-items:center;gap:5px}
.chip:active{transform:scale(.96)}
.chip.sel{background:var(--red);color:#fff;border-color:var(--red)}

/* SEARCH */
.srch-wrap{background:var(--red);padding:0 14px 14px}
.srch-inner{background:#fff;border-radius:var(--rf);display:flex;align-items:center;padding:10px 14px;gap:8px}
.srch-in{border:none;outline:none;flex:1;font-size:14px;color:var(--text);background:transparent;font-family:inherit}
.srch-in::placeholder{color:var(--t3)}

/* FILTER PILLS */
.pills{display:flex;gap:8px;padding:10px 14px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;flex-shrink:0}
.pills::-webkit-scrollbar{display:none}
.pill{padding:7px 13px;border-radius:var(--rf);border:1.5px solid var(--border);font-size:12px;font-weight:500;white-space:nowrap;cursor:pointer;background:#fff;color:var(--t2);transition:all .15s;-webkit-tap-highlight-color:transparent;flex-shrink:0;font-family:inherit}
.pill.on{background:var(--red);color:#fff;border-color:var(--red)}
.sel-input{padding:7px 13px;border-radius:var(--rf);border:1.5px solid var(--border);font-size:12px;background:#fff;color:var(--t2);cursor:pointer;outline:none;font-family:inherit;white-space:nowrap;-webkit-tap-highlight-color:transparent}
.sel-input:focus{border-color:var(--red)}

/* SECTION */
.sec-h{padding:12px 14px 6px;display:flex;align-items:center;justify-content:space-between}
.sec-t{font-size:15px;font-weight:700}
.sec-lk{font-size:13px;color:var(--red);font-weight:600;cursor:pointer;-webkit-tap-highlight-color:transparent}

/* FEATURED BANNER */
.feat{margin:0 14px 12px;border-radius:var(--r);overflow:hidden;position:relative;cursor:pointer;-webkit-tap-highlight-color:transparent;box-shadow:var(--shm)}
.feat:active{transform:scale(.99)}
.feat-img{height:175px;display:flex;align-items:center;justify-content:center;font-size:70px;position:relative}
.feat-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.75) 0%,transparent 55%)}
.feat-badge{position:absolute;top:12px;left:12px;background:var(--red);color:#fff;padding:4px 10px;border-radius:var(--rf);font-size:11px;font-weight:700;letter-spacing:.4px}
.feat-body{position:absolute;bottom:0;left:0;right:0;padding:12px 14px;color:#fff}
.feat-title{font-size:17px;font-weight:800;margin-bottom:3px;line-height:1.25}
.feat-meta{font-size:12px;opacity:.85}

/* EVENT CARDS (feed) */
.feed{padding:0 14px;display:flex;flex-direction:column;gap:12px}
.card{background:#fff;border-radius:var(--r);overflow:hidden;box-shadow:var(--sh);cursor:pointer;-webkit-tap-highlight-color:transparent;transition:transform .15s}
.card:active{transform:scale(.99)}
.card-hero{height:145px;display:flex;align-items:center;justify-content:center;font-size:56px;position:relative}
.card-cat{position:absolute;top:10px;left:10px;background:rgba(0,0,0,.55);color:#fff;padding:3px 9px;border-radius:var(--rf);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;backdrop-filter:blur(4px)}
.card-price{position:absolute;top:10px;right:10px;background:rgba(0,0,0,.6);color:#fff;padding:3px 9px;border-radius:var(--rf);font-size:11px;font-weight:700;backdrop-filter:blur(4px)}
.card-save{position:absolute;bottom:10px;right:10px;width:32px;height:32px;border-radius:50%;background:rgba(0,0,0,.45);border:none;font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;backdrop-filter:blur(4px);-webkit-tap-highlight-color:transparent}
.card-body{padding:11px 13px}
.card-title{font-size:14px;font-weight:700;margin-bottom:5px;line-height:1.3;color:var(--text)}
.card-meta{display:flex;flex-direction:column;gap:2px;margin-bottom:9px}
.card-row{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--t2)}
.card-foot{display:flex;gap:8px}
.card-book{flex:1;background:var(--red);color:#fff;border:none;padding:9px;border-radius:var(--rs);font-size:13px;font-weight:600;cursor:pointer;-webkit-tap-highlight-color:transparent;font-family:inherit}
.card-book:active{background:var(--red-d)}
.card-share{background:var(--bg);border:none;width:38px;border-radius:var(--rs);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}

/* HORIZONTAL SCROLL CARDS */
.h-scroll{display:flex;gap:11px;overflow-x:auto;padding:2px 14px 12px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.h-scroll::-webkit-scrollbar{display:none}
.card-sm{background:#fff;border-radius:var(--r);overflow:hidden;box-shadow:var(--sh);cursor:pointer;flex-shrink:0;width:165px;-webkit-tap-highlight-color:transparent}
.card-sm:active{transform:scale(.97)}
.card-sm-hero{height:90px;display:flex;align-items:center;justify-content:center;font-size:36px;position:relative}
.card-sm-save{position:absolute;top:6px;right:6px;width:26px;height:26px;border-radius:50%;background:rgba(0,0,0,.4);border:none;font-size:13px;display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-tap-highlight-color:transparent}
.card-sm-body{padding:8px 10px}
.card-sm-title{font-size:12px;font-weight:700;color:var(--text);margin-bottom:3px;line-height:1.3;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.card-sm-date{font-size:10px;color:var(--t3)}

/* EXPLORE */
.exp-page{padding:14px}
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.cat-card{background:#fff;border-radius:var(--r);overflow:hidden;box-shadow:var(--sh);cursor:pointer;-webkit-tap-highlight-color:transparent;border:2px solid transparent;transition:all .15s}
.cat-card:active{transform:scale(.97)}
.cat-card.on{border-color:var(--red)}
.cat-hero{height:76px;display:flex;align-items:center;justify-content:center;font-size:34px}
.cat-nm{padding:6px 12px 4px;font-size:13px;font-weight:700}
.cat-ct{padding:0 12px 10px;font-size:11px;color:var(--t2)}
.exp-back{display:flex;align-items:center;gap:8px;padding:0 0 12px;cursor:pointer;font-size:14px;font-weight:600;color:var(--red);-webkit-tap-highlight-color:transparent;background:none;border:none;font-family:inherit}
.exp-events{display:flex;flex-direction:column;gap:10px}

/* EVENT DETAIL */
.det{background:#fff;min-height:100%}
.det-hero{min-height:210px;display:flex;align-items:center;justify-content:center;font-size:76px;position:relative}
.det-back{position:absolute;top:14px;left:14px;width:38px;height:38px;border-radius:50%;background:rgba(0,0,0,.5);border:none;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);-webkit-tap-highlight-color:transparent}
.det-acts{position:absolute;top:14px;right:14px;display:flex;gap:8px}
.det-act{width:38px;height:38px;border-radius:50%;background:rgba(0,0,0,.5);border:none;color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);-webkit-tap-highlight-color:transparent}
.det-body{padding:18px 16px 130px}
.det-cat{display:inline-flex;align-items:center;gap:4px;padding:4px 11px;border-radius:var(--rf);font-size:11px;font-weight:700;background:#FFF0F1;color:var(--red);margin-bottom:10px}
.det-title{font-size:21px;font-weight:800;margin-bottom:5px;line-height:1.25}
.det-org{font-size:13px;color:var(--t2);margin-bottom:16px}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:16px}
.info-c{background:var(--bg);border-radius:var(--rs);padding:11px}
.info-c.wide{grid-column:span 2}
.info-lbl{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:3px}
.info-val{font-size:13px;font-weight:600;color:var(--text);line-height:1.3}
.map-btn{background:var(--bg);border:1.5px dashed var(--border);border-radius:var(--r);height:120px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;margin-bottom:16px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.map-btn:active{background:#E2E8F0}
.att-row{display:flex;align-items:center;gap:10px;background:var(--bg);border-radius:var(--rs);padding:11px;margin-bottom:16px}
.avs{display:flex}.av{width:27px;height:27px;border-radius:50%;background:var(--red);border:2px solid #fff;margin-left:-7px;display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;font-weight:700}.av:first-child{margin-left:0}
.tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.tg{padding:4px 10px;border-radius:var(--rf);font-size:11px;background:var(--bg);color:var(--t2)}
.det-desc{font-size:14px;line-height:1.7;color:var(--t2);margin-bottom:20px}
.det-foot{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;padding:12px 16px;background:#fff;border-top:1px solid var(--border);display:flex;gap:10px;box-shadow:0 -4px 12px rgba(0,0,0,.08);z-index:50}

/* GROUP BOOKING */
.grp-page{padding:16px;padding-bottom:120px}
.evt-mini{background:#fff;border-radius:var(--r);padding:13px;display:flex;gap:12px;align-items:center;margin-bottom:18px;box-shadow:var(--sh)}
.evt-mini-em{font-size:32px;width:54px;height:54px;border-radius:var(--rs);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.form-sec{background:#fff;border-radius:var(--r);padding:16px;margin-bottom:14px;box-shadow:var(--sh)}
.form-sec-t{font-size:14px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:6px}
.form-g{display:flex;flex-direction:column;gap:5px;margin-bottom:11px}
.form-lbl{font-size:11px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.5px}
.form-in{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:var(--rs);font-size:14px;color:var(--text);background:#fff;outline:none;transition:border-color .15s;font-family:inherit}
.form-in:focus{border-color:var(--red)}
.m-list{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.m-item{display:flex;align-items:center;gap:11px;padding:11px;background:var(--bg);border-radius:var(--rs)}
.m-av{width:37px;height:37px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:15px;flex-shrink:0}
.m-rm{background:none;border:none;color:var(--t3);cursor:pointer;font-size:17px;padding:4px;margin-left:auto}
.grp-foot{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;padding:12px 16px;background:#fff;border-top:1px solid var(--border);z-index:50;box-shadow:0 -4px 12px rgba(0,0,0,.08)}

/* NOTIFICATIONS */
.notif-list{padding:12px 14px;display:flex;flex-direction:column;gap:10px}
.notif-item{background:#fff;border-radius:var(--r);padding:13px;display:flex;gap:11px;box-shadow:var(--sh);border-left:3px solid transparent;cursor:pointer}
.notif-item.unread{border-left-color:var(--red)}
.n-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
.n-title{font-size:13px;font-weight:700;margin-bottom:3px;color:var(--text)}
.n-body{font-size:12px;color:var(--t2);margin-bottom:3px;line-height:1.5}
.n-time{font-size:11px;color:var(--t3)}
.n-badge{width:8px;height:8px;border-radius:50%;background:var(--red);flex-shrink:0;margin-top:4px}

/* SAVED */
.saved-page{padding:14px}
.saved-empty{padding:48px 24px;text-align:center}
.saved-grid{display:flex;flex-direction:column;gap:10px}

/* PROFILE */
.prof-page{background:var(--bg);min-height:100%}
.prof-hero{background:var(--red);padding:26px 16px 48px;text-align:center;color:#fff}
.prof-av{width:68px;height:68px;border-radius:50%;background:rgba(255,255,255,.22);display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 10px;border:3px solid rgba(255,255,255,.38)}
.prof-name{font-size:19px;font-weight:800;margin-bottom:3px}
.prof-sub{font-size:12px;opacity:.82}
.prof-card{background:#fff;border-radius:var(--r);margin:-26px 14px 14px;padding:16px;box-shadow:var(--shm)}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;border-bottom:1px solid var(--border);padding-bottom:14px;margin-bottom:14px}
.stat{text-align:center}
.stat-n{font-size:21px;font-weight:800;color:var(--red)}
.stat-l{font-size:10px;color:var(--t2);margin-top:2px}
.lang-row{display:flex;gap:6px;margin:0 14px 14px}
.lang-btn{flex:1;padding:9px 6px;border-radius:var(--rs);border:1.5px solid var(--border);font-size:13px;font-weight:600;cursor:pointer;background:#fff;color:var(--t2);text-align:center;-webkit-tap-highlight-color:transparent;font-family:inherit;transition:all .15s}
.lang-btn.on{background:var(--red);color:#fff;border-color:var(--red)}
.menu-card{background:#fff;border-radius:var(--r);margin:0 14px 14px;box-shadow:var(--sh);overflow:hidden}
.menu-item{display:flex;align-items:center;gap:13px;padding:14px 15px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .15s;-webkit-tap-highlight-color:transparent}
.menu-item:last-child{border-bottom:none}
.menu-item:active{background:var(--bg)}
.menu-ic{font-size:19px;width:30px;text-align:center;flex-shrink:0}
.menu-lbl{flex:1;font-size:14px;font-weight:500}
.menu-arr{color:var(--t3);font-size:14px}

/* MARKETER */
.mkt-page{padding:14px;padding-bottom:80px}
.mkt-hero{background:linear-gradient(135deg,#1a1a2e,#16213e);border-radius:var(--r);padding:20px;margin-bottom:14px;color:#fff}
.mkt-t{font-size:17px;font-weight:800;margin-bottom:3px}
.mkt-s{font-size:12px;opacity:.72}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:12px}
.s-card{background:#fff;border-radius:var(--r);padding:14px;box-shadow:var(--sh)}
.s-ic{font-size:21px;margin-bottom:7px}
.s-val{font-size:23px;font-weight:800;color:var(--red);margin-bottom:2px}
.s-lbl{font-size:11px;color:var(--t2)}
.ch-card{background:#fff;border-radius:var(--r);padding:15px;margin-bottom:11px;box-shadow:var(--sh)}
.ch-t{font-size:14px;font-weight:700;margin-bottom:13px}
.bar-ch{display:flex;align-items:flex-end;gap:8px;height:88px;margin-bottom:4px}
.bg{display:flex;flex-direction:column;align-items:center;flex:1;gap:4px;height:100%}
.bf{width:100%;border-radius:4px 4px 0 0;background:var(--red);flex-shrink:0;transition:height .5s}
.bl{font-size:10px;color:var(--t2);text-align:center;white-space:nowrap}
.bv{font-size:10px;color:var(--t3);font-weight:600}
.donut-w{display:flex;align-items:center;gap:14px}
.legend{display:flex;flex-direction:column;gap:6px;flex:1}
.leg-r{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--t2)}
.leg-d{width:9px;height:9px;border-radius:50%;flex-shrink:0}

.pref-page{background:#fff;min-height:100%}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-end;justify-content:center;animation:fi .2s}
@keyframes fi{from{opacity:0}to{opacity:1}}
.sheet{background:#fff;border-radius:20px 20px 0 0;padding:22px;width:100%;max-width:430px;animation:su .28s ease}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 18px}
.sheet-em{font-size:52px;text-align:center;margin-bottom:10px}
.sheet-t{font-size:19px;font-weight:800;text-align:center;margin-bottom:7px}
.sheet-s{font-size:14px;color:var(--t2);text-align:center;margin-bottom:22px;line-height:1.5}
.sheet-btns{display:flex;gap:9px}

/* EMPTY STATE */
.empty{padding:44px 22px;text-align:center}
.empty em{font-size:52px;display:block;margin-bottom:10px;font-style:normal}
.empty h3{font-size:17px;font-weight:700;margin-bottom:7px}
.empty p{font-size:13px;color:var(--t2);line-height:1.6}

.toast{position:fixed;top:18px;left:50%;transform:translateX(-50%);background:#0F172A;color:#fff;padding:10px 18px;border-radius:var(--rf);font-size:13px;z-index:300;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,.25);animation:ta 2.8s ease forwards;max-width:360px;text-align:center}
@keyframes ta{0%{opacity:0;transform:translateX(-50%) translateY(-8px)}12%{opacity:1;transform:translateX(-50%) translateY(0)}80%{opacity:1}100%{opacity:0}}

// ── UTILS ─────────────────────────────────────────────────────────

function tr(lang,...path){
  let o=T[lang]||T.en;
  for(const k of path){o=o?.[k];}
  if(o===undefined){let fb=T.en;for(const k of path)fb=fb?.[k];return fb??path[path.length-1];}
  return o;
}
function catLbl(id,lang){const c=CATS.find(x=>x.id===id);return c?(c[lang]||c.en):id;}
function catEm(id){return CATS.find(x=>x.id===id)?.em||'🎪';}
function fmtD(s){try{return new Date(s+'T00:00:00').toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short'});}catch{return s;}}

// ── CONTEXT ───────────────────────────────────────────────────────

const Ctx=createContext(null);

// ── SHARED COMPONENTS ─────────────────────────────────────────────

function Toast({msg}){return <div className="toast">{msg}</div>;}

function SaveBtn({id,style={}}){
  const {saved,toggleSave}=useContext(Ctx);
  const on=saved.has(id);
  return(
    <button className="card-sm-save" style={style}
      onClick={e=>{e.stopPropagation();toggleSave(id);}}>
      {on?'❤️':'🤍'}
    </button>
  );
}

function EventCardSm({ev,onClick}){
  const {saved,toggleSave}=useContext(Ctx);
  return(
    <div className="card-sm" onClick={()=>onClick(ev)}>
      <div className="card-sm-hero" style={{background:ev.grad}}>
        {ev.em}
        <button className="card-sm-save" onClick={e=>{e.stopPropagation();toggleSave(ev.id);}}>
          {saved.has(ev.id)?'❤️':'🤍'}
        </button>
      </div>
      <div className="card-sm-body">
        <div className="card-sm-title">{ev.title}</div>
        <div className="card-sm-date">{fmtD(ev.date)} · {ev.zone}</div>
      </div>

}

function EventCard({ev,onDetail,onBook}){
  const {lang,saved,toggleSave}=useContext(Ctx);
  return(
    <div className="card" onClick={()=>onDetail(ev)}>
      <div className="card-hero" style={{background:ev.grad}}>
        {ev.em}
        <div className="card-cat">{catEm(ev.cat)} {catLbl(ev.cat,lang)}</div>
        <div className="card-price">{ev.price}</div>
        <button className="card-save" onClick={e=>{e.stopPropagation();toggleSave(ev.id);}}>
          {saved.has(ev.id)?'❤️':'🤍'}
        </button>
      </div>
      <div className="card-body">
        <div className="card-title">{ev.title}</div>
        <div className="card-meta">
          <div className="card-row">📅 {fmtD(ev.date)} · {ev.time}</div>
          <div className="card-row">📍 {ev.venue}</div>
          <div className="card-row">👥 {ev.att.toLocaleString('en-IN')} {tr(lang,'det','attending')}</div>
        </div>
        <div className="card-foot">
          <button className="card-book" onClick={e=>{e.stopPropagation();onBook(ev);}}>
            🎟️ {tr(lang,'bookNow')} →

          <button className="card-share" onClick={e=>{e.stopPropagation();navigator.clipboard?.writeText(`https://chennaigot.app/event/${ev.id}`);}} title="Share">🔗</button>

}

// ── ONBOARDING ────────────────────────────────────────────────────

function Onboarding({onDone}){
  const [step,setStep]=useState(0);
  const [city,setCity]=useState('');
  const [lang,setLang]=useState('en');
  const [ints,setInts]=useState([]);
  const [zones,setZones]=useState([]);
  const tot=4;
  const toggleInt=id=>setInts(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id]);
  const toggleZone=z=>setZones(p=>p.includes(z)?p.filter(x=>x!==z):[...p,z]);
  const canNext=step===0?!!city:step===1?!!lang:true;
  const doNext=()=>step<tot-1?setStep(s=>s+1):onDone({city,lang,interests:ints,zones});

  const cities=[
    {id:'chennai',em:'🌊',nm:tr(lang,'ob','chennai'),dc:tr(lang,'ob','chennaiD')},
    {id:'bangalore',em:'🌳',nm:tr(lang,'ob','blr'),dc:tr(lang,'ob','blrD')},
  ];
  const langs=[
    {id:'en',fl:'🇬🇧',nm:'English',na:'English'},
    {id:'ta',fl:'🇮🇳',nm:'Tamil',na:'தமிழ்'},
    {id:'hi',fl:'🇮🇳',nm:'Hindi',na:'हिंदी'},
  ];

  return(
    <div className="ob">
      <div className="ob-hero">
        <div className="ob-logo">🎉</div>
        <div className="ob-name">{tr(lang,'app')}</div>
        <div className="ob-tag">{tr(lang,'ob','tag')}</div>
      </div>
      <div className="ob-prog">
        {Array.from({length:tot},(_,i)=>(
          <div key={i} className={`ob-d ${i<step?'done':i===step?'on':'off'}`}/>
        ))}
      </div>
      <div className="ob-body">
        {step===0&&<>
          <div className="ob-t">{tr(lang,'ob','city')}</div>
          <div className="ob-s">{tr(lang,'ob','citySub')}</div>
          <div className="city-grid">
            {cities.map(c=>(
              <div key={c.id} className={`city-card${city===c.id?' sel':''}`} onClick={()=>setCity(c.id)}>
                <div className="city-em">{c.em}</div>
                <div className="city-nm">{c.nm}</div>
                <div className="city-dc">{c.dc}</div>
              </div>
            ))}
          </div>
        </>}
        {step===1&&<>
          <div className="ob-t">{tr(lang,'ob','lang')}</div>
          <div className="ob-s">{tr(lang,'ob','langSub')}</div>
          <div className="lang-list">
            {langs.map(l=>(
              <div key={l.id} className={`lang-card${lang===l.id?' sel':''}`} onClick={()=>setLang(l.id)}>
                <span style={{fontSize:26}}>{l.fl}</span>
                <div>
                  <div style={{fontWeight:700,fontSize:15}}>{l.nm}</div>
                  <div style={{fontSize:13,color:'var(--t2)'}}>{l.na}</div>
                </div>
                {lang===l.id&&<span style={{marginLeft:'auto',color:'var(--red)',fontWeight:700,fontSize:18}}>✓</span>}
              </div>
            ))}
          </div>
        </>}
        {step===2&&<>
          <div className="ob-t">{tr(lang,'ob','int')}</div>
          <div className="ob-s">{tr(lang,'ob','intSub')}</div>
          <div className="chips">
            {INTERESTS.map(i=>(
              <div key={i.id} className={`chip${ints.includes(i.id)?' sel':''}`} onClick={()=>toggleInt(i.id)}>
                {i.em} {i[lang]||i.en}
              </div>
            ))}
          </div>
        </>}
        {step===3&&<>
          <div className="ob-t">{tr(lang,'ob','zones')}</div>
          <div className="ob-s">{tr(lang,'ob','zonesSub')}</div>
          <div className="chips">
            {(ZONES[city]||[]).map(z=>(
              <div key={z} className={`chip${zones.includes(z)?' sel':''}`} onClick={()=>toggleZone(z)}>
                📍 {z}
              </div>
            ))}
          </div>
        </>}
      </div>
      <div className="ob-foot">
        {step>0&&<button className="btn btn-ghost" onClick={()=>setStep(s=>s-1)}>← {tr(lang,'ob','back')}</button>}
        {(step===2||step===3)&&(
          <button className="btn btn-ghost" style={{marginLeft:'auto'}}
            onClick={()=>step<tot-1?setStep(s=>s+1):onDone({city,lang,interests:ints,zones})}>
            {tr(lang,'ob','skip')}
          </button>
        )}
        <button className="btn btn-red" style={{flex:1,opacity:canNext?1:.45,pointerEvents:canNext?'auto':'none'}}
          onClick={doNext}>
          {step<tot-1?tr(lang,'ob','next'):tr(lang,'ob','finish')}
        </button>
      </div>
    </div>
  );
}

// ── HOME PAGE ─────────────────────────────────────────────────────

function HomePage({filters,setFilters,onDetail,onBook}){
  const {lang,user,saved,toggleSave}=useContext(Ctx);
  const cityEvs=EVENTS.filter(e=>!user.city||e.city===user.city);

  const filtered=useMemo(()=>cityEvs.filter(e=>{
    if(filters.cat!=='all'&&e.cat!==filters.cat)return false;
    if(filters.zone!=='all'&&e.zone!==filters.zone)return false;
    if(filters.date&&e.date!==filters.date)return false;
    if(filters.search){
      const q=filters.search.toLowerCase();
      if(!e.title.toLowerCase().includes(q)&&!e.venue.toLowerCase().includes(q)&&!e.zone.toLowerCase().includes(q))return false;
    }
    return true;
  }),[filters,user.city]);

  const recommended=useMemo(()=>{
    if(!user.interests?.length)return cityEvs.slice(0,6);
    const matched=cityEvs.filter(e=>user.interests.includes(e.cat));
    return matched.length?matched.slice(0,6):cityEvs.slice(0,6);
  },[user]);

  const featuredEv=cityEvs.find(e=>e.att>1000)||cityEvs[0];
  const isFiltering=filters.cat!=='all'||filters.zone!=='all'||filters.date||filters.search;
  const cityZones=ZONES[user.city]||[];

  return(
    <div>
      {/* Search bar */}
      <div className="srch-wrap">
        <div className="srch-inner">
          <span style={{fontSize:15,color:'var(--t3)'}}>🔍</span>
          <input className="srch-in" placeholder={tr(lang,'srch')}
            value={filters.search} onChange={e=>setFilters(f=>({...f,search:e.target.value}))}/>
          {filters.search&&<span style={{cursor:'pointer',color:'var(--t3)',fontSize:15}} onClick={()=>setFilters(f=>({...f,search:''}))}>✕</span>}
        </div>
      </div>

      {/* Category pills */}
      <div className="pills">
        {CATS.map(c=>(
          <button key={c.id} className={`pill${filters.cat===c.id?' on':''}`}
            onClick={()=>setFilters(f=>({...f,cat:c.id}))}>
            {c.em} {c[lang]||c.en}
          </button>
        ))}
      </div>

      {/* Date + Zone + Clear */}
      <div style={{display:'flex',gap:8,padding:'0 14px 10px',overflowX:'auto',scrollbarWidth:'none'}}>
        <input type="date" className="sel-input" value={filters.date}
          onChange={e=>setFilters(f=>({...f,date:e.target.value}))} style={{flexShrink:0}}/>
        <select className="sel-input" value={filters.zone}
          onChange={e=>setFilters(f=>({...f,zone:e.target.value}))} style={{flexShrink:0,cursor:'pointer'}}>
          <option value="all">📍 All Zones</option>
          {cityZones.map(z=><option key={z} value={z}>{z}</option>)}
        </select>
        {isFiltering&&(
          <button className="pill on" style={{flexShrink:0}}
            onClick={()=>setFilters({cat:'all',zone:'all',date:'',search:''})}>
            ✕ Clear
          </button>
        )}
      </div>

      {/* Content — show sections only when not actively filtering */}
      {!isFiltering&&(
        <>
          {/* Featured */}
          {featuredEv&&(
            <div style={{padding:'4px 14px 0'}}>
              <div className="feat" onClick={()=>onDetail(featuredEv)}>
                <div className="feat-img" style={{background:featuredEv.grad}}>
                  {featuredEv.em}
                  <div className="feat-overlay"/>
                </div>
                <div className="feat-badge">⭐ {tr(lang,'featured')}</div>
                <div className="feat-body">
                  <div className="feat-title">{featuredEv.title}</div>
                  <div className="feat-meta">📅 {fmtD(featuredEv.date)} · 📍 {featuredEv.zone}</div>
                </div>
              </div>
            </div>
          )}

          {/* For You */}
          {recommended.length>0&&(
            <>
              <div className="sec-h">
                <div className="sec-t">⭐ {tr(lang,'recommended')}</div>
                <div className="sec-lk" onClick={()=>setFilters(f=>({...f,cat:'all'}))}>{tr(lang,'seeAll')}</div>
              </div>
              <div className="h-scroll">
                {recommended.map(e=><EventCardSm key={e.id} ev={e} onClick={onDetail}/>)}
              </div>
            </>
          )}

          <div className="sec-h">
            <div className="sec-t">🗓 {tr(lang,'upcoming')}</div>
            <div style={{fontSize:12,color:'var(--t2)'}}>{filtered.length} events</div>
          </div>
        </>
      )}

      {isFiltering&&(
        <div className="sec-h">
          <div className="sec-t">
            {filtered.length} {filtered.length===1?'event':'events'} found
          </div>
        </div>
      )}

      {/* Main event list */}
      <div className="feed" style={{paddingBottom:8}}>
        {filtered.length===0?(
          <div className="empty">
            <em>🔍</em>
            <h3>No events found</h3>
            <p>{tr(lang,'noEvt')}</p>
            {isFiltering&&<button className="btn btn-red btn-sm" style={{marginTop:14}} onClick={()=>setFilters({cat:'all',zone:'all',date:'',search:''})}>Clear Filters</button>}
          </div>
        ):filtered.map(e=><EventCard key={e.id} ev={e} onDetail={onDetail} onBook={onBook}/>)}
      </div>
    </div>
  );
}

// ── EXPLORE PAGE ──────────────────────────────────────────────────

function ExplorePage({filters,setFilters,onDetail,onBook}){
  const {lang,user,saved,toggleSave}=useContext(Ctx);
  const [selCat,setSelCat]=useState(null);
  const [selZone,setSelZone]=useState(null);
  const cityEvs=EVENTS.filter(e=>!user.city||e.city===user.city);
  const cityZones=ZONES[user.city]||[];

  // Events to show when a category or zone is selected
  const expEvts=useMemo(()=>{
    if(!selCat&&!selZone)return[];
    return cityEvs.filter(e=>{
      if(selCat&&e.cat!==selCat)return false;
      if(selZone&&e.zone!==selZone)return false;
      return true;
    });
  },[selCat,selZone,user.city]);

  const inBrowse=!selCat&&!selZone;

  function selectCat(id){setSelCat(id);setSelZone(null);}
  function selectZone(z){setSelZone(z);setSelCat(null);}
  function clearSel(){setSelCat(null);setSelZone(null);}

  const catGrads={
    music:'linear-gradient(135deg,#667eea,#764ba2)',
    food:'linear-gradient(135deg,#f6d365,#fda085)',
    entertainment:'linear-gradient(135deg,#a18cd1,#fbc2eb)',
    comedy:'linear-gradient(135deg,#0fd850,#f9f047)',
    art:'linear-gradient(135deg,#fccb90,#d57eeb)',
    sports:'linear-gradient(135deg,#43e97b,#38f9d7)',
    cultural:'linear-gradient(135deg,#ee9ca7,#ffdde1)',
  };

  return(
    <div className="exp-page">
      {!inBrowse&&(
        <button className="exp-back" onClick={clearSel}>
          ← {selCat?catLbl(selCat,lang)+' Events':selZone+' Events'}
        </button>
      )}

      {inBrowse&&(
        <>
          <div style={{fontWeight:700,fontSize:15,marginBottom:12}}>Browse by Category</div>
          <div className="cat-grid">
            {CATS.filter(c=>c.id!=='all').map(c=>{
              const cnt=cityEvs.filter(e=>e.cat===c.id).length;
              return(
                <div key={c.id} className={`cat-card${selCat===c.id?' on':''}`} onClick={()=>selectCat(c.id)}>
                  <div className="cat-hero" style={{background:catGrads[c.id]||'#eee'}}>{c.em}</div>
                  <div className="cat-nm">{c[lang]||c.en}</div>
                  <div className="cat-ct">{cnt} event{cnt!==1?'s':''}</div>
                </div>
              );
            })}
          </div>

          <div style={{fontWeight:700,fontSize:15,margin:'16px 0 10px'}}>Browse by Zone</div>
          <div className="chips">
            {cityZones.map(z=>(
              <div key={z} className="chip" onClick={()=>selectZone(z)}>📍 {z}</div>
            ))}
          </div>
        </>
      )}

      {!inBrowse&&(
        <div className="exp-events">
          {expEvts.length===0?(
            <div className="empty">
              <em>🤷</em>
              <h3>No events here</h3>
              <p>No events found for this filter. Try another category or zone.</p>
            </div>
          ):expEvts.map(e=>(
            <EventCard key={e.id} ev={e} onDetail={onDetail} onBook={onBook}/>
          ))}
        </div>
      )}
    </div>
  );
}

// ── APP ROOT ──────────────────────────────────────────────────────

function App(){
  const stored=useMemo(()=>{try{return JSON.parse(localStorage.getItem('cgi_user')||'null');}catch{return null;}},[]);
  const [user,setUser]=useState(stored);
  const [lang,setLangState]=useState(stored?.lang||'en');
  const [page,setPage]=useState('home'); // home|explore|saved|alerts|profile|event|group|marketer|prefs
  const [selEv,setSelEv]=useState(null);
  const [notifs,setNotifs]=useState(NOTIFS_0);
  const [bookEv,setBookEv]=useState(null);
  const [saved,setSaved]=useState(()=>{try{return new Set(JSON.parse(localStorage.getItem('cgi_saved')||'[]'));}catch{return new Set();}});
  const [toast,setToast]=useState(null);
  const toastRef=useRef(null);
  // App-level filters (shared between Home and Explore navigate-to-home)
  const [filters,setFilters]=useState({cat:'all',zone:'all',date:'',search:''});

  function setLang(l){
    setLangState(l);
    if(user){const u={...user,lang:l};setUser(u);localStorage.setItem('cgi_user',JSON.stringify(u));}
  }

  function showToast(msg){
    setToast(msg);clearTimeout(toastRef.current);
    toastRef.current=setTimeout(()=>setToast(null),2800);
  }

  function toggleSave(id){
    setSaved(p=>{
      const next=new Set(p);
      if(next.has(id)){next.delete(id);showToast('Removed from saved');}
      else{next.add(id);showToast('❤️ Saved!');}
      localStorage.setItem('cgi_saved',JSON.stringify([...next]));
      return next;
    });
  }

  function handleOnboardDone(data){
    const u={...data,onboarded:true};
    setUser(u);setLangState(data.lang||'en');
    localStorage.setItem('cgi_user',JSON.stringify(u));
    setPage('home');
  }

  function handleSavePrefs(data){
    const u={...user,...data};setUser(u);
    localStorage.setItem('cgi_user',JSON.stringify(u));
    setPage('profile');showToast('Preferences saved!');
  }

  function openEvent(ev){setSelEv(ev);setPage('event');}
  function openGroup(ev){setSelEv(ev);setPage('group');}

  function handleBook(ev){
    setBookEv(ev);
    window.open(ev.burl,'_blank');
  }

  function handleGroupBook(ev,members){
    setBookEv(ev);
    window.open(ev.burl,'_blank');
    setPage('event');
  }

  function handleBookYes(){
    showToast(`Booking confirmed for "${bookEv?.title}"!`);
    setNotifs(p=>[{id:Date.now(),unread:true,icon:'🎟️',bg:'#F0FFF4',title:'Booking recorded!',body:`Your booking for "${bookEv?.title}" has been noted.`,time:'Just now'},...p]);
    setBookEv(null);
  }

  const ctx={user,lang,setLang,notifs,setNotifs,saved,toggleSave};
  const unread=notifs.filter(n=>n.unread).length;
  const navItems=[
    {id:'home',icon:'🏠',label:tr(lang,'home')},
    {id:'explore',icon:'🔍',label:tr(lang,'explore')},
    {id:'saved',icon:'❤️',label:tr(lang,'saved')},
    {id:'alerts',icon:'🔔',label:tr(lang,'alerts'),badge:unread>0},
  ];

  // Pages that replace the whole screen (no shared header/nav)
  const fullScreen=['event','group','marketer','prefs'];
  const showHeader=!fullScreen.includes(page);
  const showNav=!fullScreen.includes(page);

  if(!user){
    return <Ctx.Provider value={ctx}><Onboarding onDone={handleOnboardDone}/></Ctx.Provider>;
  }

  const headerTitle=
    page==='alerts'?tr(lang,'notif','title'):
    page==='profile'?tr(lang,'prof','title'):
    page==='explore'?tr(lang,'explore'):
    page==='saved'?tr(lang,'savedPage','title'):
    '🎉 '+tr(lang,'app').slice(0,14)+'…';

  return(
    <Ctx.Provider value={ctx}>
      <div className="app">
        {showHeader&&(
          <div className="header">
            <div style={{flex:1}}>
              <div className="header-title">{headerTitle}</div>
              {page==='home'&&<div className="header-sub">📍 {user.city==='chennai'?tr(lang,'ob','chennai'):tr(lang,'ob','blr')}</div>}
            </div>
            {page==='home'&&(
              <button className="icon-btn" title="Switch language"
                onClick={()=>setLang(lang==='en'?'ta':lang==='ta'?'hi':'en')}>🌐</button>
            )}
            <button className="icon-btn" onClick={()=>setPage('profile')}>👤</button>
          </div>
        )}

        <div className="content">
          {page==='home'&&<HomePage filters={filters} setFilters={setFilters} onDetail={openEvent} onBook={handleBook}/>}
          {page==='explore'&&<ExplorePage filters={filters} setFilters={setFilters} onDetail={openEvent} onBook={handleBook}/>}
          {page==='saved'&&<SavedPage onDetail={openEvent} onBook={handleBook}/>}
          {page==='alerts'&&<AlertsPage/>}
          {page==='profile'&&<ProfilePage onMarketer={()=>setPage('marketer')} onPrefs={()=>setPage('prefs')}/>}
          {page==='event'&&selEv&&<EventDetail ev={selEv} onBack={()=>setPage('home')} onBook={handleBook} onGroupBook={openGroup}/>}
          {page==='group'&&selEv&&<GroupBooking ev={selEv} onBack={()=>setPage('event')} onBook={handleGroupBook}/>}
          {page==='marketer'&&<MarketerDash onBack={()=>setPage('profile')}/>}
          {page==='prefs'&&<PrefsPage onBack={()=>setPage('profile')} onSave={handleSavePrefs}/>}
        </div>

        {showNav&&(
          <nav className="nav">
            {navItems.map(n=>(
              <button key={n.id} className={`nav-btn${page===n.id?' on':''}`} onClick={()=>setPage(n.id)}>
                <span className="nav-icon">
                  {n.badge?<span style={{position:'relative',display:'inline-block'}}>{n.icon}<span className="n-dot"/></span>:n.icon}
                </span>
                <span className="nav-label">{n.label}</span>
              </button>
            ))}
          </nav>
        )}

        {bookEv&&<BookSheet ev={bookEv} onYes={handleBookYes} onNo={()=>setBookEv(null)}/>}
        {toast&&<Toast msg={toast}/>}
      </div>
    </Ctx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
