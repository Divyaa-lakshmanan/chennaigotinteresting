<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ChennaigotInteresting 🎉</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎉</text></svg>">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #E63946; --primary-dark: #C1121F; --primary-light: #ff6b6b;
      --secondary: #457B9D; --accent: #F4A261;
      --bg: #F8FAFC; --card: #FFFFFF; --text: #1E293B; --text-2: #475569;
      --text-3: #94A3B8; --border: #E2E8F0; --success: #10B981;
      --radius: 12px; --radius-sm: 8px; --radius-full: 999px;
      --shadow: 0 1px 3px rgba(0,0,0,.1),0 1px 2px rgba(0,0,0,.06);
      --shadow-md: 0 4px 6px rgba(0,0,0,.07),0 2px 4px rgba(0,0,0,.06);
      --shadow-lg: 0 10px 15px rgba(0,0,0,.1),0 4px 6px rgba(0,0,0,.05);
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: #CBD5E1; color: var(--text); min-height: 100vh;
      display: flex; justify-content: center; -webkit-font-smoothing: antialiased;
    }
    #root { width: 100%; max-width: 430px; min-height: 100vh; background: var(--bg); position: relative; box-shadow: 0 0 40px rgba(0,0,0,.2); }
    ::-webkit-scrollbar { width: 3px; } ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* LAYOUT */
    .app { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
    .app-header { background: var(--primary); color: white; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; z-index: 50; }
    .header-left { display: flex; flex-direction: column; }
    .header-title { font-size: 17px; font-weight: 800; letter-spacing: -0.3px; }
    .header-sub { font-size: 11px; opacity: .8; }
    .header-actions { display: flex; gap: 8px; align-items: center; }
    .icon-btn { background: rgba(255,255,255,.2); border: none; color: white; width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 16px; transition: background .15s; -webkit-tap-highlight-color: transparent; }
    .icon-btn:active { background: rgba(255,255,255,.35); }
    .content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: 72px; }

    /* BOTTOM NAV */
    .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px; background: white; border-top: 1px solid var(--border); display: grid; grid-template-columns: repeat(4,1fr); z-index: 100; box-shadow: 0 -4px 12px rgba(0,0,0,.08); }
    .nav-btn { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; padding: 8px 4px 10px; border: none; background: none; cursor: pointer; -webkit-tap-highlight-color: transparent; min-height: 56px; }
    .nav-icon { font-size: 22px; position: relative; }
    .nav-label { font-size: 10px; font-weight: 500; color: var(--text-3); }
    .nav-btn.active .nav-label { color: var(--primary); font-weight: 700; }
    .notif-dot { position: absolute; top: -2px; right: -4px; width: 8px; height: 8px; background: var(--primary); border-radius: 50%; border: 1.5px solid white; }

    /* BUTTONS */
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 12px 20px; border-radius: var(--radius-full); border: none; font-size: 14px; font-weight: 600; cursor: pointer; transition: all .15s; -webkit-tap-highlight-color: transparent; white-space: nowrap; }
    .btn:active { transform: scale(.97); }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-outline { background: white; color: var(--primary); border: 1.5px solid var(--primary); }
    .btn-ghost { background: var(--bg); color: var(--text-2); }
    .btn-success { background: var(--success); color: white; }
    .btn-full { width: 100%; }
    .btn-sm { padding: 8px 14px; font-size: 13px; }
    .btn-lg { padding: 14px 28px; font-size: 16px; }

    /* ONBOARDING */
    .onboarding { min-height: 100vh; display: flex; flex-direction: column; background: white; }
    .ob-hero { background: var(--primary); padding: 56px 24px 36px; color: white; text-align: center; }
    .ob-logo { font-size: 52px; margin-bottom: 12px; }
    .ob-app-name { font-size: 22px; font-weight: 800; margin-bottom: 4px; }
    .ob-tagline { font-size: 13px; opacity: .85; line-height: 1.5; }
    .ob-progress { display: flex; gap: 6px; justify-content: center; padding: 20px 24px 0; }
    .ob-dot { height: 6px; border-radius: 3px; background: var(--border); transition: all .3s; }
    .ob-dot.done { background: var(--success); width: 18px; }
    .ob-dot.active { background: var(--primary); width: 28px; }
    .ob-dot.pending { width: 8px; }
    .ob-body { flex: 1; padding: 24px; overflow-y: auto; }
    .ob-title { font-size: 21px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
    .ob-sub { font-size: 14px; color: var(--text-2); margin-bottom: 22px; line-height: 1.5; }
    .ob-footer { padding: 16px 24px 32px; display: flex; gap: 10px; }

    /* CITY CARDS */
    .city-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
    .city-card { border: 2px solid var(--border); border-radius: var(--radius); padding: 20px 12px; text-align: center; cursor: pointer; background: white; transition: all .2s; -webkit-tap-highlight-color: transparent; }
    .city-card:active { transform: scale(.97); }
    .city-card.selected { border-color: var(--primary); background: #FFF0F1; }
    .city-card-emoji { font-size: 40px; margin-bottom: 8px; }
    .city-card-name { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
    .city-card-desc { font-size: 11px; color: var(--text-2); }

    /* LANG CARDS */
    .lang-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
    .lang-card { border: 2px solid var(--border); border-radius: var(--radius); padding: 14px 18px; display: flex; align-items: center; gap: 14px; cursor: pointer; background: white; transition: all .2s; -webkit-tap-highlight-color: transparent; }
    .lang-card:active { transform: scale(.98); }
    .lang-card.selected { border-color: var(--primary); background: #FFF0F1; }
    .lang-flag { font-size: 28px; }
    .lang-name { font-size: 16px; font-weight: 700; color: var(--text); }
    .lang-native { font-size: 13px; color: var(--text-2); }

    /* CHIPS */
    .chips { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
    .chip { padding: 9px 16px; border-radius: var(--radius-full); border: 1.5px solid var(--border); font-size: 13px; font-weight: 500; cursor: pointer; background: white; color: var(--text); transition: all .15s; -webkit-tap-highlight-color: transparent; display: flex; align-items: center; gap: 6px; }
    .chip:active { transform: scale(.96); }
    .chip.selected { background: var(--primary); color: white; border-color: var(--primary); }

    /* SEARCH + FILTER */
    .search-wrap { background: var(--primary); padding: 0 14px 14px; }
    .search-inner { background: white; border-radius: var(--radius-full); display: flex; align-items: center; padding: 10px 14px; gap: 8px; }
    .search-icon { font-size: 15px; color: var(--text-3); flex-shrink: 0; }
    .search-input { border: none; outline: none; flex: 1; font-size: 14px; color: var(--text); background: transparent; }
    .search-input::placeholder { color: var(--text-3); }
    .filter-bar { display: flex; gap: 8px; padding: 12px 14px; overflow-x: auto; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
    .filter-bar::-webkit-scrollbar { display: none; }
    .filter-chip { padding: 7px 14px; border-radius: var(--radius-full); border: 1.5px solid var(--border); font-size: 13px; font-weight: 500; white-space: nowrap; cursor: pointer; background: white; color: var(--text-2); transition: all .15s; -webkit-tap-highlight-color: transparent; flex-shrink: 0; }
    .filter-chip.active { background: var(--primary); color: white; border-color: var(--primary); }
    .date-filter { padding: 7px 14px; border-radius: var(--radius-full); border: 1.5px solid var(--border); font-size: 13px; background: white; color: var(--text-2); cursor: pointer; outline: none; font-family: inherit; white-space: nowrap; -webkit-tap-highlight-color: transparent; }
    .date-filter:focus { border-color: var(--primary); }

    /* SECTION */
    .section-hdr { padding: 14px 14px 6px; display: flex; align-items: center; justify-content: space-between; }
    .section-title { font-size: 16px; font-weight: 700; }
    .section-link { font-size: 13px; color: var(--primary); font-weight: 600; cursor: pointer; }

    /* EVENT CARDS */
    .events-feed { padding: 0 14px; display: flex; flex-direction: column; gap: 12px; }
    .event-card { background: white; border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); cursor: pointer; transition: transform .15s; -webkit-tap-highlight-color: transparent; }
    .event-card:active { transform: scale(.99); }
    .event-hero { height: 150px; display: flex; align-items: center; justify-content: center; font-size: 60px; position: relative; }
    .event-cat-badge { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,.55); color: white; padding: 3px 10px; border-radius: var(--radius-full); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; backdrop-filter: blur(4px); }
    .event-price-badge { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,.6); color: white; padding: 3px 10px; border-radius: var(--radius-full); font-size: 12px; font-weight: 700; backdrop-filter: blur(4px); }
    .event-body { padding: 12px 14px; }
    .event-title { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 6px; line-height: 1.3; }
    .event-meta { display: flex; flex-direction: column; gap: 3px; margin-bottom: 10px; }
    .event-meta-row { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-2); }
    .event-footer { display: flex; gap: 8px; }
    .event-book-btn { flex: 1; background: var(--primary); color: white; border: none; padding: 10px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; cursor: pointer; -webkit-tap-highlight-color: transparent; transition: background .15s; }
    .event-book-btn:active { background: var(--primary-dark); }
    .event-icon-btn { background: var(--bg); border: none; width: 40px; border-radius: var(--radius-sm); cursor: pointer; font-size: 15px; display: flex; align-items: center; justify-content: center; -webkit-tap-highlight-color: transparent; }

    /* HORIZONTAL SCROLL */
    .events-h-scroll { display: flex; gap: 12px; overflow-x: auto; padding: 4px 14px 12px; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
    .events-h-scroll::-webkit-scrollbar { display: none; }
    .event-card-sm { background: white; border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); cursor: pointer; flex-shrink: 0; width: 170px; -webkit-tap-highlight-color: transparent; }
    .event-card-sm:active { transform: scale(.97); }
    .event-hero-sm { height: 90px; display: flex; align-items: center; justify-content: center; font-size: 38px; }
    .event-body-sm { padding: 9px 10px; }
    .event-title-sm { font-size: 12px; font-weight: 700; color: var(--text); margin-bottom: 3px; line-height: 1.3; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
    .event-date-sm { font-size: 11px; color: var(--text-3); }

    /* EVENT DETAIL */
    .event-detail { background: white; min-height: 100%; }
    .event-detail-hero { min-height: 220px; display: flex; align-items: center; justify-content: center; font-size: 80px; position: relative; }
    .back-btn { position: absolute; top: 14px; left: 14px; width: 38px; height: 38px; border-radius: 50%; background: rgba(0,0,0,.5); border: none; color: white; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px); -webkit-tap-highlight-color: transparent; }
    .share-btn-hero { position: absolute; top: 14px; right: 14px; width: 38px; height: 38px; border-radius: 50%; background: rgba(0,0,0,.5); border: none; color: white; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px); -webkit-tap-highlight-color: transparent; }
    .event-detail-body { padding: 20px 16px 120px; }
    .detail-cat-chip { display: inline-flex; align-items: center; gap: 5px; padding: 4px 12px; border-radius: var(--radius-full); font-size: 12px; font-weight: 600; margin-bottom: 10px; background: #FFF0F1; color: var(--primary); }
    .detail-title { font-size: 22px; font-weight: 800; margin-bottom: 6px; line-height: 1.25; }
    .detail-org { font-size: 13px; color: var(--text-2); margin-bottom: 18px; }
    .detail-info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 18px; }
    .detail-info-card { background: var(--bg); border-radius: var(--radius-sm); padding: 12px; }
    .detail-info-label { font-size: 10px; color: var(--text-3); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 4px; }
    .detail-info-val { font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.3; }
    .map-block { background: var(--bg); border-radius: var(--radius); height: 130px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; margin-bottom: 18px; border: 1.5px dashed var(--border); cursor: pointer; }
    .map-block:active { background: #E2E8F0; }
    .attending-row { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; padding: 12px; background: var(--bg); border-radius: var(--radius-sm); }
    .avatars { display: flex; }
    .av { width: 28px; height: 28px; border-radius: 50%; background: var(--primary); border: 2px solid white; margin-left: -8px; display: flex; align-items: center; justify-content: center; font-size: 11px; color: white; font-weight: 700; }
    .av:first-child { margin-left: 0; }
    .attending-text { font-size: 13px; color: var(--text-2); flex: 1; }
    .tags-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 18px; }
    .tag-chip { padding: 4px 10px; border-radius: var(--radius-full); font-size: 11px; font-weight: 500; background: var(--bg); color: var(--text-2); }
    .detail-desc { font-size: 14px; line-height: 1.7; color: var(--text-2); margin-bottom: 20px; }
    .detail-footer { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px; padding: 12px 16px; background: white; border-top: 1px solid var(--border); display: flex; gap: 10px; box-shadow: 0 -4px 12px rgba(0,0,0,.08); z-index: 50; }

    /* GROUP BOOKING */
    .group-page { padding: 16px; padding-bottom: 120px; }
    .event-mini-card { background: white; border-radius: var(--radius); padding: 14px; display: flex; gap: 12px; align-items: center; margin-bottom: 20px; box-shadow: var(--shadow); }
    .event-mini-emoji { font-size: 36px; width: 56px; height: 56px; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .event-mini-title { font-size: 14px; font-weight: 700; margin-bottom: 3px; }
    .event-mini-date { font-size: 12px; color: var(--text-2); }
    .form-section { background: white; border-radius: var(--radius); padding: 16px; margin-bottom: 16px; box-shadow: var(--shadow); }
    .form-section-title { font-size: 14px; font-weight: 700; margin-bottom: 14px; color: var(--text); display: flex; align-items: center; gap: 6px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
    .form-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px; }
    .form-label { font-size: 11px; font-weight: 600; color: var(--text-2); text-transform: uppercase; letter-spacing: .5px; }
    .form-input { width: 100%; padding: 10px 12px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-size: 14px; color: var(--text); background: white; outline: none; transition: border-color .15s; font-family: inherit; }
    .form-input:focus { border-color: var(--primary); }
    .member-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
    .member-item { display: flex; align-items: center; gap: 12px; padding: 12px; background: var(--bg); border-radius: var(--radius-sm); }
    .member-av { width: 38px; height: 38px; border-radius: 50%; background: var(--primary); display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 15px; flex-shrink: 0; }
    .member-name { font-size: 14px; font-weight: 600; color: var(--text); }
    .member-contact { font-size: 12px; color: var(--text-2); }
    .member-remove { background: none; border: none; color: var(--text-3); cursor: pointer; font-size: 18px; padding: 4px; margin-left: auto; }
    .share-row { display: flex; gap: 8px; margin-top: 8px; }
    .group-footer { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px; padding: 12px 16px; background: white; border-top: 1px solid var(--border); z-index: 50; box-shadow: 0 -4px 12px rgba(0,0,0,.08); }

    /* NOTIFICATIONS */
    .notif-header-bar { padding: 14px 16px 0; display: flex; align-items: center; justify-content: space-between; }
    .notif-list { padding: 12px 14px; display: flex; flex-direction: column; gap: 10px; }
    .notif-item { background: white; border-radius: var(--radius); padding: 14px; display: flex; gap: 12px; box-shadow: var(--shadow); border-left: 3px solid transparent; }
    .notif-item.unread { border-left-color: var(--primary); }
    .notif-icon-box { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
    .notif-content { flex: 1; }
    .notif-title { font-size: 13px; font-weight: 700; margin-bottom: 3px; color: var(--text); }
    .notif-body { font-size: 12px; color: var(--text-2); margin-bottom: 4px; line-height: 1.5; }
    .notif-time { font-size: 11px; color: var(--text-3); }

    /* PROFILE */
    .profile-page { background: var(--bg); min-height: 100%; }
    .profile-hero { background: var(--primary); padding: 28px 16px 52px; text-align: center; color: white; }
    .profile-av { width: 72px; height: 72px; border-radius: 50%; background: rgba(255,255,255,.25); display: flex; align-items: center; justify-content: center; font-size: 30px; margin: 0 auto 12px; border: 3px solid rgba(255,255,255,.4); }
    .profile-name { font-size: 20px; font-weight: 800; margin-bottom: 3px; }
    .profile-city { font-size: 13px; opacity: .85; }
    .profile-stats-card { background: white; border-radius: var(--radius); margin: -28px 14px 14px; padding: 16px; box-shadow: var(--shadow-md); }
    .stats-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; border-bottom: 1px solid var(--border); padding-bottom: 14px; margin-bottom: 14px; }
    .stat-box { text-align: center; }
    .stat-num { font-size: 22px; font-weight: 800; color: var(--primary); }
    .stat-lbl { font-size: 10px; color: var(--text-2); margin-top: 2px; }
    .interests-preview { display: flex; flex-wrap: wrap; gap: 6px; }
    .menu-card { background: white; border-radius: var(--radius); margin: 0 14px 14px; box-shadow: var(--shadow); overflow: hidden; }
    .menu-item { display: flex; align-items: center; gap: 14px; padding: 14px 16px; cursor: pointer; border-bottom: 1px solid var(--border); transition: background .15s; -webkit-tap-highlight-color: transparent; }
    .menu-item:last-child { border-bottom: none; }
    .menu-item:active { background: var(--bg); }
    .menu-icon { font-size: 20px; width: 32px; text-align: center; flex-shrink: 0; }
    .menu-label { flex: 1; font-size: 14px; font-weight: 500; }
    .menu-arrow { color: var(--text-3); font-size: 14px; }
    .lang-toggle-row { display: flex; gap: 6px; margin: 0 14px 14px; }
    .lang-btn { flex: 1; padding: 10px 8px; border-radius: var(--radius-sm); border: 1.5px solid var(--border); font-size: 13px; font-weight: 600; cursor: pointer; background: white; color: var(--text-2); transition: all .15s; text-align: center; -webkit-tap-highlight-color: transparent; }
    .lang-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

    /* MARKETER */
    .marketer-page { padding: 14px; padding-bottom: 80px; }
    .marketer-hero { background: linear-gradient(135deg, #1a1a2e, #16213e); border-radius: var(--radius); padding: 20px; margin-bottom: 14px; color: white; }
    .marketer-hero-title { font-size: 18px; font-weight: 800; margin-bottom: 4px; }
    .marketer-hero-sub { font-size: 12px; opacity: .75; }
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
    .stat-card { background: white; border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow); }
    .stat-card-icon { font-size: 22px; margin-bottom: 8px; }
    .stat-card-val { font-size: 24px; font-weight: 800; color: var(--primary); margin-bottom: 2px; }
    .stat-card-lbl { font-size: 11px; color: var(--text-2); }
    .chart-card { background: white; border-radius: var(--radius); padding: 16px; margin-bottom: 12px; box-shadow: var(--shadow); }
    .chart-title { font-size: 14px; font-weight: 700; margin-bottom: 14px; }
    .bar-chart { display: flex; align-items: flex-end; gap: 8px; height: 90px; margin-bottom: 4px; }
    .bar-grp { display: flex; flex-direction: column; align-items: center; flex: 1; gap: 4px; height: 100%; }
    .bar-fill { width: 100%; border-radius: 4px 4px 0 0; flex-shrink: 0; transition: height .5s; }
    .bar-lbl { font-size: 10px; color: var(--text-2); text-align: center; white-space: nowrap; }
    .bar-val { font-size: 10px; color: var(--text-3); font-weight: 600; }
    .donut-wrap { display: flex; align-items: center; gap: 16px; }
    .legend { display: flex; flex-direction: column; gap: 7px; flex: 1; }
    .legend-row { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-2); }
    .legend-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }

// ───────────── UTILS ─────────────

function tr(lang, ...path) {
  let o = T[lang] || T.en;
  for (const k of path) { o = o?.[k]; }
  if (o === undefined) {
    let fb = T.en;
    for (const k of path) { fb = fb?.[k]; }
    return fb ?? path[path.length - 1];
  }
  return o;
}

function catLabel(cat, lang) {
  const c = CATEGORIES.find(x => x.id === cat);
  return c ? (c[lang] || c.en) : cat;
}

function fmtDate(dateStr) {
  try {
    const d = new Date(dateStr + 'T00:00:00');
    return d.toLocaleDateString('en-IN', { weekday:'short', day:'numeric', month:'short' });
  } catch { return dateStr; }
}

function catEmoji(cat) {
  return CATEGORIES.find(x => x.id === cat)?.emoji || '🎪';
}

// ONBOARDING
function OnboardingPage({ onComplete }) {
  const [step, setStep] = useState(0);
  const [city, setCity] = useState('');
  const [lang, setLang] = useState('en');
  const [interests, setInterests] = useState([]);
  const [zones, setZones] = useState([]);

  const steps = ['city','lang','interests','zones'];
  const total = steps.length;

  function toggleInterest(id) {
    setInterests(p => p.includes(id) ? p.filter(x => x !== id) : [...p, id]);
  }
  function toggleZone(z) {
    setZones(p => p.includes(z) ? p.filter(x => x !== z) : [...p, z]);
  }

  function handleNext() {
    if (step < total - 1) setStep(s => s + 1);
    else onComplete({ city, lang, interests, zones });
  }

  const cities = [
    { id:'chennai', emoji:'🌊', name: tr(lang,'onb','chennai'), desc: tr(lang,'onb','chennaiDesc') },
    { id:'bangalore', emoji:'🌳', name: tr(lang,'onb','bangalore'), desc: tr(lang,'onb','bangaloreDesc') },
  ];
  const langs = [
    { id:'en', flag:'🇬🇧', name:'English', native:'English' },
    { id:'ta', flag:'🇮🇳', name:'Tamil', native:'தமிழ்' },
    { id:'hi', flag:'🇮🇳', name:'Hindi', native:'हिंदी' },
  ];

  const canNext = step === 0 ? !!city : step === 1 ? !!lang : true;

  return (
    <div className="onboarding">
      <div className="ob-hero">
        <div className="ob-logo">🎉</div>
        <div className="ob-app-name">{tr(lang,'appName')}</div>
        <div className="ob-tagline">{tr(lang,'onb','tagline')}</div>
      </div>
      <div className="ob-progress">
        {steps.map((_, i) => (
          <div key={i} className={`ob-dot ${i < step ? 'done' : i === step ? 'active' : 'pending'}`} />
        ))}
      </div>
      <div className="ob-body">
        {step === 0 && (<>
          <div className="ob-title">{tr(lang,'onb','chooseCity')}</div>
          <div className="ob-sub">{tr(lang,'onb','citySub')}</div>
          <div className="city-grid">
            {cities.map(c => (
              <div key={c.id} className={`city-card ${city === c.id ? 'selected' : ''}`} onClick={() => setCity(c.id)}>
                <div className="city-card-emoji">{c.emoji}</div>
                <div className="city-card-name">{c.name}</div>
                <div className="city-card-desc">{c.desc}</div>
              </div>
            ))}
          </div>
        </>)}

        {step === 1 && (<>
          <div className="ob-title">{tr(lang,'onb','chooseLang')}</div>
          <div className="ob-sub">{tr(lang,'onb','langSub')}</div>
          <div className="lang-list">
            {langs.map(l => (
              <div key={l.id} className={`lang-card ${lang === l.id ? 'selected' : ''}`} onClick={() => setLang(l.id)}>
                <div className="lang-flag">{l.flag}</div>
                <div>
                  <div className="lang-name">{l.name}</div>
                  <div className="lang-native">{l.native}</div>
                </div>
                {lang === l.id && <span style={{marginLeft:'auto',color:'var(--primary)',fontWeight:700}}>✓</span>}
              </div>
            ))}
          </div>
        </>)}

        {step === 2 && (<>
          <div className="ob-title">{tr(lang,'onb','chooseInterests')}</div>
          <div className="ob-sub">{tr(lang,'onb','interestsSub')}</div>
          <div className="chips">
            {INTERESTS.map(i => (
              <div key={i.id} className={`chip ${interests.includes(i.id) ? 'selected' : ''}`} onClick={() => toggleInterest(i.id)}>
                {i.emoji} {i[lang] || i.en}
              </div>
            ))}
          </div>
        </>)}

        {step === 3 && (<>
          <div className="ob-title">{tr(lang,'onb','chooseZones')}</div>
          <div className="ob-sub">{tr(lang,'onb','zonesSub')}</div>
          <div className="chips">
            {(ZONES[city] || []).map(z => (
              <div key={z} className={`chip ${zones.includes(z) ? 'selected' : ''}`} onClick={() => toggleZone(z)}>
                📍 {z}
              </div>
            ))}
          </div>
        </>)}
      </div>
      <div className="ob-footer">
        {step > 0 && (
          <button className="btn btn-ghost" onClick={() => setStep(s => s - 1)}>← Back</button>
        )}
        {(step === 2 || step === 3) && (
          <button className="btn btn-ghost" style={{marginLeft:'auto',marginRight:0}} onClick={() => step < total-1 ? setStep(s=>s+1) : onComplete({city,lang,interests,zones})}>
            {tr(lang,'onb','skip')}
          </button>
        )}
        <button className="btn btn-primary" style={{flex:1}} onClick={handleNext} disabled={!canNext}
          style={{flex:1,opacity:canNext?1:.5,background:'var(--primary)',color:'white',borderRadius:'999px',border:'none',padding:'13px 20px',fontWeight:700,fontSize:'15px',cursor:canNext?'pointer':'default'}}>
          {step < total - 1 ? tr(lang,'onb','next') : tr(lang,'onb','finish')}
        </button>
      </div>
    </div>
  );
}

// HOME
function HomePage({ onDetail, onBook }) {
  const { user, lang, notifs } = useContext(Ctx);
  const [search, setSearch] = useState('');
  const [catFilter, setCatFilter] = useState('all');
  const [dateFilter, setDateFilter] = useState('');
  const [zoneFilter, setZoneFilter] = useState('all');

  const cityEvents = EVENTS.filter(e => !user.city || e.city === user.city);

  const filtered = useMemo(() => {
    return cityEvents.filter(e => {
      if (catFilter !== 'all' && e.category !== catFilter) return false;
      if (dateFilter && e.date !== dateFilter) return false;
      if (zoneFilter !== 'all' && e.zone !== zoneFilter) return false;
      if (search) {
        const q = search.toLowerCase();
        if (!e.title.toLowerCase().includes(q) && !e.venue.toLowerCase().includes(q) && !e.zone.toLowerCase().includes(q)) return false;
      }
      return true;
    });
  }, [catFilter, dateFilter, zoneFilter, search, user.city]);

  const recommended = useMemo(() => {
    if (!user.interests?.length) return cityEvents.slice(0, 5);
    return cityEvents.filter(e => user.interests.includes(e.category)).slice(0, 5);
  }, [user]);

  const unreadCount = notifs.filter(n => n.unread).length;

  const cityZones = ZONES[user.city] || [];

  return (
    <div>
      <div className="search-wrap">
        <div className="search-inner">
          <span className="search-icon">🔍</span>
          <input className="search-input" placeholder={tr(lang,'searchPlaceholder')}
            value={search} onChange={e => setSearch(e.target.value)} />
          {search && <span style={{cursor:'pointer',color:'var(--text-3)',fontSize:'16px'}} onClick={() => setSearch('')}>✕</span>}
        </div>
      </div>

      <div className="filter-bar">
        {CATEGORIES.map(c => (
          <div key={c.id} className={`filter-chip ${catFilter === c.id ? 'active' : ''}`}
            onClick={() => setCatFilter(c.id)}>
            {c.emoji} {c[lang] || c.en}
          </div>
        ))}
      </div>

      <div style={{display:'flex',gap:'8px',padding:'0 14px 12px',overflowX:'auto',scrollbarWidth:'none'}}>
        <input type="date" className="date-filter" value={dateFilter} onChange={e => setDateFilter(e.target.value)}
          style={{flexShrink:0}} />
        <select className="date-filter" value={zoneFilter} onChange={e => setZoneFilter(e.target.value)}
          style={{flexShrink:0,cursor:'pointer'}}>
          <option value="all">📍 All Zones</option>
          {cityZones.map(z => <option key={z} value={z}>{z}</option>)}
        </select>
        {(catFilter !== 'all' || dateFilter || zoneFilter !== 'all' || search) && (
          <button className="filter-chip" style={{background:'#FFF0F1',color:'var(--primary)',borderColor:'var(--primary)',flexShrink:0}}
            onClick={() => { setCatFilter('all'); setDateFilter(''); setZoneFilter('all'); setSearch(''); }}>
            ✕ Clear
          </button>
        )}
      </div>

      {!search && catFilter === 'all' && !dateFilter && zoneFilter === 'all' && recommended.length > 0 && (
        <div>
          <div className="section-hdr">
            <div className="section-title">⭐ {tr(lang,'recommended')}</div>
          </div>
          <div className="events-h-scroll">
            {recommended.map(e => <EventCardSmall key={e.id} event={e} onClick={onDetail} />)}
          </div>
          <div className="section-hdr" style={{paddingTop:'4px'}}>
            <div className="section-title">🗓 {tr(lang,'upcoming')}</div>
            <div className="section-link">{filtered.length} events</div>
          </div>
        </div>
      )}

      <div className="events-feed">
        {filtered.length === 0 ? (
          <div className="empty-state">
            <div className="empty-emoji">🔍</div>
            <div className="empty-title">No events found</div>
            <div className="empty-sub">{tr(lang,'noEvents')}</div>
          </div>
        ) : filtered.map(e => (
          <EventCard key={e.id} event={e} onBook={onBook} onDetail={onDetail} />
        ))}
      </div>
    </div>
  );
}

// GROUP BOOKING
function GroupBookingPage({ event, onBack, onBook }) {
  const { lang } = useContext(Ctx);
  const [name, setName] = useState('');
  const [contact, setContact] = useState('');
  const [members, setMembers] = useState([]);

  function addMember() {
    if (!name.trim()) return;
    setMembers(p => [...p, { id: Date.now(), name: name.trim(), contact: contact.trim() }]);
    setName(''); setContact('');
  }

  function removeMember(id) {
    setMembers(p => p.filter(m => m.id !== id));
  }

  function handleBook() {
    if (members.length === 0) { alert('Please add at least one group member.'); return; }
    onBook(event, members);
  }

  const inviteLink = `https://chennaigot.app/group-invite/${event.id}-${Date.now().toString(36)}`;

  return (
    <div style={{background:'var(--bg)',minHeight:'100vh'}}>
      <div className="app-header">
        <button className="icon-btn" onClick={onBack}>←</button>
        <div style={{flex:1,textAlign:'center',fontWeight:700,fontSize:'16px'}}>{tr(lang,'group','title')}</div>
        <div style={{width:36}} />
      </div>
      <div className="group-page">
        <div className="event-mini-card">
          <div className="event-mini-emoji" style={{background:event.gradient}}>{event.emoji}</div>
          <div>
            <div className="event-mini-title">{event.title}</div>
            <div className="event-mini-date">📅 {fmtDate(event.date)} · {event.time}</div>
            <div className="event-mini-date">📍 {event.zone}</div>
          </div>
        </div>

        <div className="form-section">
          <div className="form-section-title">👤 {tr(lang,'group','addSection')}</div>
          <div className="form-group">
            <label className="form-label">{tr(lang,'group','name')}</label>
            <input className="form-input" placeholder="e.g. Priya Rajan" value={name} onChange={e => setName(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && addMember()} />
          </div>
          <div className="form-group">
            <label className="form-label">{tr(lang,'group','contact')}</label>
            <input className="form-input" placeholder="e.g. priya@email.com or 98765XXXXX" value={contact}
              onChange={e => setContact(e.target.value)} onKeyDown={e => e.key === 'Enter' && addMember()} />
          </div>
          <button className="btn btn-primary btn-full" onClick={addMember} disabled={!name.trim()}
            style={{opacity:name.trim()?1:.5}}>
            + {tr(lang,'group','addBtn')}
          </button>
        </div>

        {members.length > 0 && (
          <div className="form-section">
            <div className="form-section-title">👥 {tr(lang,'group','members')} ({members.length})</div>
            <div className="member-list">
              {members.map((m,i) => (
                <div key={m.id} className="member-item">
                  <div className="member-av">{m.name[0].toUpperCase()}</div>
                  <div style={{flex:1}}>
                    <div className="member-name">{m.name}</div>
                    {m.contact && <div className="member-contact">{m.contact}</div>}
                  </div>
                  <button className="member-remove" onClick={() => removeMember(m.id)}>✕</button>
                </div>
              ))}
            </div>

            <div style={{fontWeight:600,fontSize:'13px',marginBottom:'8px',color:'var(--text-2)'}}>
              🔗 {tr(lang,'group','share')}
            </div>
            <div className="share-row">
              <button className="btn btn-ghost btn-sm btn-full" style={{background:'#25D366',color:'white'}}
                onClick={() => window.open(`https://wa.me/?text=Join us for ${event.title}! ${inviteLink}`)}>
                {tr(lang,'group','whatsapp')}
              </button>
              <button className="btn btn-ghost btn-sm btn-full"
                onClick={() => { navigator.clipboard?.writeText(inviteLink); alert('Link copied!'); }}>
                {tr(lang,'group','copyLink')}
              </button>
            </div>
          </div>
        )}

        {members.length === 0 && (
          <div style={{textAlign:'center',padding:'24px',color:'var(--text-3)',fontSize:'14px'}}>
            👆 Add members above to create your group
          </div>
        )}
      </div>
      <div className="group-footer">
        <div style={{fontSize:'13px',color:'var(--text-2)',marginBottom:'8px'}}>
          {members.length > 0 ? `Booking for ${members.length + 1} people (you + ${members.length})` : 'Add members to proceed'}
        </div>
        <button className="btn btn-primary btn-full btn-lg" onClick={handleBook} disabled={members.length === 0}
          style={{opacity:members.length>0?1:.5}}>
          🎟️ {tr(lang,'group','bookGroup')} ({members.length + 1} tickets)
        </button>
      </div>
    </div>
  );
}

// MARKETER DASHBOARD
function MarketerPage({ onBack }) {
  const { lang } = useContext(Ctx);
  const maxAge = Math.max(...MARKETER.age.map(a => a.pct));

  // Simple SVG donut
  const donutR = 40, donutC = 50;
  const circumference = 2 * Math.PI * donutR;
  let offset = 0;
  const donutSlices = MARKETER.cats.map(c => {
    const len = (c.pct / 100) * circumference;
    const slice = { ...c, offset, len };
    offset += len;
    return slice;
  });

  return (
    <div>
      <div className="app-header">
        <button className="icon-btn" onClick={onBack}>←</button>
        <div style={{flex:1,textAlign:'center'}}>
          <div style={{fontWeight:800,fontSize:'16px'}}>{tr(lang,'marketer','title')}</div>
        </div>
        <div style={{width:36}} />
      </div>
      <div className="marketer-page">
        <div className="marketer-hero">
          <div className="marketer-hero-title">📊 {tr(lang,'marketer','title')}</div>
          <div className="marketer-hero-sub">{tr(lang,'marketer','subtitle')}</div>
          <div style={{marginTop:'12px',fontSize:'12px',opacity:.7}}>Last updated: Today, 9:00 AM</div>
        </div>

        <div className="stats-grid">
          {MARKETER.stats.map((s,i) => (
            <div key={i} className="stat-card">
              <div className="stat-card-icon">{s.icon}</div>
              <div className="stat-card-val">{s.val}</div>
              <div className="stat-card-lbl">{s.label}</div>
            </div>
          ))}
        </div>

        <div className="chart-card">
          <div className="chart-title">{tr(lang,'marketer','ageDist')}</div>
          <div className="bar-chart">
            {MARKETER.age.map(a => (
              <div key={a.lbl} className="bar-grp">
                <div className="bar-val">{a.pct}%</div>
                <div className="bar-fill" style={{
                  height: `${(a.pct / maxAge) * 60}px`,
                  background: `linear-gradient(to top, var(--primary), var(--primary-light))`
                }} />
                <div className="bar-lbl">{a.lbl}</div>
              </div>
            ))}
          </div>
        </div>

        <div className="chart-card">
          <div className="chart-title">{tr(lang,'marketer','catBreak')}</div>
          <div className="donut-wrap">
            <svg width="100" height="100" viewBox="0 0 100 100">
              {donutSlices.map((s,i) => (
                <circle key={i} cx={donutC} cy={donutC} r={donutR}
                  fill="none" stroke={s.color} strokeWidth="18"
                  strokeDasharray={`${s.len} ${circumference - s.len}`}
                  strokeDashoffset={-s.offset}
                  transform={`rotate(-90 ${donutC} ${donutC})`}
                />
              ))}
              <text x="50" y="54" textAnchor="middle" fontSize="11" fontWeight="700" fill="var(--text)">100%</text>
            </svg>
            <div className="legend">
              {MARKETER.cats.map(c => (
                <div key={c.lbl} className="legend-row">
                  <div className="legend-dot" style={{background:c.color}} />
                  <span>{c.lbl}</span>
                  <span className="legend-pct">{c.pct}%</span>
                </div>
              ))}
            </div>
          </div>
        </div>

        <div className="chart-card">
          <div className="chart-title">{tr(lang,'marketer','zonePop')}</div>
          {MARKETER.zones.map(z => (
            <div key={z.lbl} style={{marginBottom:'10px'}}>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:'12px',marginBottom:'4px'}}>
                <span style={{color:'var(--text-2)',fontWeight:500}}>📍 {z.lbl}</span>
                <span style={{color:'var(--text)',fontWeight:700}}>{z.pct}%</span>
              </div>
              <div style={{height:'6px',background:'var(--border)',borderRadius:'3px',overflow:'hidden'}}>
                <div style={{height:'100%',width:`${z.pct}%`,background:'var(--primary)',borderRadius:'3px',transition:'width .5s'}} />
              </div>
            </div>
          ))}
        </div>

        <div className="chart-card">
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'14px'}}>
            <div className="chart-title" style={{marginBottom:0}}>{tr(lang,'marketer','campaigns')}</div>
            <button className="btn btn-primary btn-sm" onClick={() => alert('Campaign creation coming soon!')}>
              {tr(lang,'marketer','newCampaign')}
            </button>
          </div>
          <div className="campaign-list">
            {MARKETER.campaigns.map((c,i) => (
              <div key={i} className="campaign-item">
                <div className="campaign-dot" style={{background:c.color}} />
                <div style={{flex:1}}>
                  <div className="campaign-name">{c.name}</div>
                  <div className="campaign-reach" style={{fontSize:'11px',marginTop:'2px'}}>

// ───────────── APP ROOT ─────────────

function App() {
  const saved = (() => {
    try { return JSON.parse(localStorage.getItem('cgi_user') || 'null'); } catch { return null; }
  })();

  const [user, setUser] = useState(saved);
  const [lang, setLang] = useState(saved?.lang || 'en');
  const [page, setPage] = useState('home');  // home|explore|notifications|profile|event-detail|group-booking|marketer
  const [selectedEvent, setSelectedEvent] = useState(null);
  const [notifs, setNotifs] = useState(NOTIFS_INIT);
  const [bookingEvent, setBookingEvent] = useState(null);
  const [toast, setToast] = useState(null);
  const toastTimer = useRef(null);

  function showToast(msg) {
    setToast(msg);
    clearTimeout(toastTimer.current);
    toastTimer.current = setTimeout(() => setToast(null), 2800);
  }

  function handleOnboardingComplete(data) {
    const newUser = { ...data, onboarded: true };
    setUser(newUser);
    setLang(data.lang || 'en');
    localStorage.setItem('cgi_user', JSON.stringify(newUser));
    setPage('home');
  }

  function handleSetLang(l) {
    setLang(l);
    if (user) {
      const updated = { ...user, lang: l };
      setUser(updated);
      localStorage.setItem('cgi_user', JSON.stringify(updated));
    }
  }

  function openEventDetail(event) {
    setSelectedEvent(event);
    setPage('event-detail');
  }

  function openGroupBooking(event) {
    setSelectedEvent(event);
    setPage('group-booking');
  }

  function handleBook(event) {
    setBookingEvent(event);
    window.open(event.bookingUrl, '_blank');
  }

  function handleGroupBook(event, members) {
    setBookingEvent(event);
    window.open(event.bookingUrl, '_blank');
    setPage('event-detail');
  }

  function handleBookingYes() {
    showToast(`✓ Booking confirmed for "${bookingEvent?.title}"!`);
    setBookingEvent(null);
    // Add a confirmation notification
    setNotifs(p => [{
      id: Date.now(), type:'group', unread:true, icon:'🎟️', iconBg:'#F0FFF4',
      title: 'Booking confirmed!',
      body: `Your booking for "${bookingEvent?.title}" was recorded.`,
      time: 'Just now'
    }, ...p]);
  }

  function handleBookingNo() {
    setBookingEvent(null);
    showToast('No worries! Come back anytime.');
  }

  function handleCatFilter(cat, zone) {
    setPage('home');
    // We pass this through a different mechanism
    // For simplicity, navigate home and user can filter there
  }

  const unreadCount = notifs.filter(n => n.unread).length;
  const ctxValue = { user, lang, setLang: handleSetLang, notifs, setNotifs };

  if (!user) {
    return (
      <Ctx.Provider value={ctxValue}>
        <OnboardingPage onComplete={handleOnboardingComplete} />
      </Ctx.Provider>
    );
  }

  const navItems = [
    { id:'home',          icon:'🏠', label: tr(lang,'home') },
    { id:'explore',       icon:'🔍', label: tr(lang,'explore') },
    { id:'notifications', icon:'🔔', label: tr(lang,'alerts'), badge: unreadCount > 0 },
    { id:'profile',       icon:'👤', label: tr(lang,'profile') },
  ];

  const showHeader = !['event-detail','group-booking','marketer'].includes(page);
  const showNav    = !['group-booking','marketer'].includes(page);

  return (
    <Ctx.Provider value={ctxValue}>
      <div className="app">
        {showHeader && (
          <div className="app-header">
            <div className="header-left">
              <div className="header-title">
                {page === 'notifications' ? tr(lang,'notifs','title') :
                 page === 'profile' ? tr(lang,'profile','title') :
                 page === 'explore' ? tr(lang,'explore') :
                 '🎉 ' + tr(lang,'appName').slice(0,14) + '…'}
              </div>
              {page === 'home' && (
                <div className="header-sub">
                  📍 {user.city === 'chennai' ? tr(lang,'onb','chennai') : tr(lang,'onb','bangalore')}
                </div>
              )}
            </div>
            <div className="header-actions">
              {page === 'home' && (
                <button className="icon-btn" title="Change language"
                  onClick={() => handleSetLang(lang === 'en' ? 'ta' : lang === 'ta' ? 'hi' : 'en')}>
                  🌐
                </button>
              )}
            </div>
          </div>
        )}

        <div className="content">
          {page === 'home' && (
            <HomePage onDetail={openEventDetail} onBook={handleBook} />
          )}
          {page === 'explore' && (
            <ExplorePage onCatFilter={handleCatFilter} />
          )}
          {page === 'notifications' && (
            <NotificationsPage />
          )}
          {page === 'profile' && (
            <ProfilePage
              onMarketer={() => setPage('marketer')}
              onEditPrefs={() => { setUser(null); localStorage.removeItem('cgi_user'); }}
            />
          )}
          {page === 'event-detail' && selectedEvent && (
            <EventDetailPage
              event={selectedEvent}
              onBack={() => setPage('home')}
              onBook={handleBook}
              onGroupBook={openGroupBooking}
            />
          )}
          {page === 'group-booking' && selectedEvent && (
            <GroupBookingPage
              event={selectedEvent}
              onBack={() => setPage('event-detail')}
              onBook={handleGroupBook}
            />
          )}
          {page === 'marketer' && (
            <MarketerPage onBack={() => setPage('profile')} />
          )}
        </div>

        {showNav && (
          <nav className="bottom-nav">
            {navItems.map(n => (
              <button key={n.id} className={`nav-btn ${page === n.id ? 'active' : ''}`} onClick={() => setPage(n.id)}>
                <span className="nav-icon">
                  {n.badge ? <span style={{position:'relative',display:'inline-block'}}>{n.icon}<span className="notif-dot"/></span> : n.icon}
                </span>
                <span className="nav-label">{n.label}</span>
              </button>
            ))}
          </nav>
        )}

        {bookingEvent && (
          <BookingSheet event={bookingEvent} onYes={handleBookingYes} onNo={handleBookingNo} lang={lang} />
        )}

        {toast && <div className="toast">{toast}</div>}
      </div>
    </Ctx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
